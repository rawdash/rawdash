name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      # Connector docs are generated at build time from connector metadata, so
      # changes there must redeploy the site even though they live outside apps/website.
      - 'packages/connectors/**'
      - 'scripts/connector-placeholders.ts'
      - 'scripts/generate-connector-docs.ts'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *' # daily rebuild so publishAt-dated pages go live

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      discussions: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so the sitemap can derive accurate <lastmod> from
          # per-file git commit dates instead of the shallow deploy commit.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter website build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_GA4_ID: ${{ vars.PUBLIC_GA4_ID }}
          CONTENT_FEED_TOKEN: ${{ secrets.CONTENT_FEED_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: rawdash-website
          directory: apps/website/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
