name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Determine affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="$(git rev-parse HEAD^1)"
          fi
          echo "filter=...[${BASE}...HEAD]" >> $GITHUB_OUTPUT

      - name: Lint
        run: pnpm turbo run lint --filter="${{ steps.affected.outputs.filter }}"

      - name: Typecheck
        run: pnpm turbo run typecheck --filter="${{ steps.affected.outputs.filter }}"

      - name: Build
        run: pnpm turbo run build --filter="${{ steps.affected.outputs.filter }}"

      - name: Test
        run: pnpm turbo run test --filter="${{ steps.affected.outputs.filter }}"
