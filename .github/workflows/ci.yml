name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    name: Changeset check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify changeset for publishable package changes
        run: pnpm changeset status --since=origin/${{ github.event.pull_request.base.ref }}

  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Check connector publishing prerequisites
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: npx tsx scripts/check-connector-publishing-prereqs.ts

      - name: Determine affected filter
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse HEAD^1)"
          else
            BASE="${{ github.event.before }}"
          fi
          echo "filter=...[${BASE}...HEAD]" >> $GITHUB_OUTPUT

      - name: Lint
        run: pnpm turbo run lint --filter="${{ steps.affected.outputs.filter }}"

      - name: Typecheck
        run: pnpm turbo run typecheck --filter="${{ steps.affected.outputs.filter }}"

      - name: Build
        run: pnpm turbo run build --filter="${{ steps.affected.outputs.filter }}"

      - name: Test
        run: pnpm turbo run test --filter="${{ steps.affected.outputs.filter }}"

      - name: Install Playwright browsers
        run: pnpm --filter example-nextjs exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm turbo run test:e2e --filter="${{ steps.affected.outputs.filter }}"
